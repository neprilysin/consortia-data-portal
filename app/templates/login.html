<!DOCTYPE html>
<html>
<head>
    <title>Login - Consortia Data Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-card { max-width: 560px; margin: 56px auto; background: white; padding: 32px; border-radius: 20px; box-shadow: 0 18px 48px rgba(30, 41, 59, 0.08); }
        .login-card h1 { margin-bottom: 12px; }
        .login-card label { display: block; font-weight: 600; margin-bottom: 10px; }
        .login-card input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 14px; margin-bottom: 20px; }
        .login-card p { color: #374151; line-height: 1.6; }
        .back-link { margin-bottom: 18px; display: inline-block; color: #4f46e5; }
    </style>
</head>
<body>
    <div class="login-card">
        <a class="back-link" href="/">← Back to homepage</a>
        <h1>Log in</h1>
        <p>Enter your work email to sign in. If you're an administrator, use the admin email to access approvals.</p>

        <form action="/login" method="post">
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="success-message">{{ success }}</div>
            {% endif %}
            <label>
                Email
                <input type="email" name="email" required placeholder="name@institution.edu" value="{{ email or '' }}">
            </label>
            <label>
                Password
                <input type="password" name="password" required placeholder="Enter your password">
            </label>

            <button class="btn btn-primary" type="submit">Sign in</button>
        </form>

        <p style="margin-top: 20px;">Need an account? <a href="/register">Register here</a>.</p>
    </div>
</body>
</html>
