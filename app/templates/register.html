<!DOCTYPE html>
<html>
<head>
    <title>Register - Consortia Data Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .register-card { max-width: 660px; margin: 48px auto; background: white; padding: 32px; border-radius: 20px; box-shadow: 0 18px 48px rgba(30, 41, 59, 0.08); }
        .register-card h1 { margin-bottom: 12px; }
        .field-group { display: grid; gap: 18px; }
        .field-group .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .register-card label { font-weight: 600; font-size: 14px; color: #111827; }
        .register-card input, .register-card textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 14px; }
        .register-card textarea { min-height: 100px; resize: vertical; }
        .policy { font-size: 14px; color: #374151; line-height: 1.6; }
        .policy input { margin-right: 10px; }
        .back-link { margin-bottom: 18px; display: inline-block; color: #4f46e5; }
        @media (max-width: 768px) { .field-group .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="register-card">
        <a class="back-link" href="/">← Back to homepage</a>
        <h1>Register for the portal</h1>
        <p>Sign up with your work details and accept the scientific data integrity policy. An administrator will review your request before you can upload data.</p>

        <form action="/register" method="post" class="field-group">
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            <div class="two-col">
                <label>
                    First name
                    <input type="text" name="first_name" required placeholder="First name">
                </label>
                <label>
                    Last name
                    <input type="text" name="last_name" required placeholder="Last name">
                </label>
            </div>

            <label>
                Title
                <input type="text" name="title" placeholder="Dr, Prof, Research Scientist...">
            </label>

            <label>
                Department / group
                <input type="text" name="department" placeholder="Department or research group">
            </label>

            <label>
                Organization
                <input type="text" name="organization" placeholder="Organisation or university">
            </label>

            <label>
                Work email
                <input type="email" name="email" required placeholder="name@institution.edu" value="{{ email or '' }}">
            </label>

            <label>
                Password
                <input type="password" name="password" required placeholder="At least 8 characters">
            </label>

            <label>
                Confirm password
                <input type="password" name="password_confirm" required placeholder="Repeat password">
            </label>

            <label class="policy">
                <input type="checkbox" name="policy_accepted" required>
                I accept the <strong>general policy of scientific data integrity</strong> and understand that uploaded datasets will be deposited in accordance with consortium standards.
            </label>

            <button class="btn btn-primary" type="submit">Submit registration</button>
        </form>
    </div>
</body>
</html>
